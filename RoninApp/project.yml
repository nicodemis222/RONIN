name: RoninApp
options:
  bundleIdPrefix: com.ronin
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: targeted
    MACOSX_DEPLOYMENT_TARGET: "15.0"
targets:
  RoninApp:
    type: application
    platform: macOS
    sources:
      - path: RoninApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronin.app
        INFOPLIST_FILE: RoninApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: RoninApp/RoninApp.entitlements
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: Ronin
    entitlements:
      path: RoninApp/RoninApp.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
  RoninAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RoninAppTests
    dependencies:
      - target: RoninApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronin.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Ronin.app/Contents/MacOS/Ronin"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_IDENTITY: "-"
